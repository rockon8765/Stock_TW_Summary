<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://data.dottdot.com; img-src 'self' data: https:; font-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'">
  <title>StockOnePage — 個股資料一頁式查詢</title>
  <script src="js/tailwind-config.js"></script>
  <script src="vendor/tailwindcss-play-cdn.js"></script>
  <script src="vendor/lightweight-charts-4.standalone.production.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-surface text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-surface/95 backdrop-blur border-b border-slate-700/50">
    <div class="max-w-7xl mx-auto px-4 py-3 space-y-2">
      <div class="flex flex-col lg:flex-row lg:items-center gap-4">
        <h1 class="text-xl font-bold text-accent shrink-0">StockOnePage</h1>
        <form id="ticker-search-form" role="search" class="flex items-center gap-2 flex-1 max-w-md">
          <label for="ticker-input" class="sr-only">股票代號</label>
          <input
            id="ticker-input"
            type="text"
            placeholder="輸入股票代號，例如 2330"
            class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent placeholder-slate-500"
          >
          <button
            id="search-btn"
            type="submit"
            class="bg-accent hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors shrink-0"
          >查詢</button>
        </form>
        <div class="flex items-center gap-2 shrink-0">
          <button
            id="print-export-btn"
            type="button"
            class="header-action bg-slate-800 border border-slate-600 text-slate-200 px-3 py-2 rounded-lg text-sm"
          >列印 / PDF</button>
          <button
            id="json-export-btn"
            type="button"
            class="header-action bg-slate-800 border border-slate-600 text-slate-200 px-3 py-2 rounded-lg text-sm"
          >下載 JSON</button>
        </div>
      </div>
      <div id="data-as-of" class="text-xs text-muted min-h-[1rem]" aria-live="polite">資料時間：—</div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- 初始提示 -->
    <div id="welcome-msg" class="text-center py-20 text-slate-500">
      <p class="text-lg">輸入股票代號開始查詢</p>
    </div>

    <!-- 資料區塊容器（預設隱藏） -->
    <div id="data-container" class="hidden space-y-6">

      <!-- Section 1: 公司概要 + 報價 + 估值指標卡片 -->
      <section id="section-profile" class="bg-card rounded-xl p-5 border border-slate-700/50">
        <div id="profile-content" class="section-loading">
          <div class="skeleton h-6 w-48 mb-3"></div>
          <div class="skeleton h-4 w-96"></div>
        </div>
        <!-- 規則警示 chips（ScoreCard_V2_New 的 7 條 sell rules） -->
        <div id="rule-alerts-container" class="mt-4 pt-4 border-t border-slate-700/50">
          <div class="section-loading"><div class="skeleton h-12 w-full rounded-lg"></div></div>
        </div>
      </section>

      <!-- Section 1.5 (MOVED): K 線圖（預設展開，緊接 Profile） -->
      <section id="section-kline" class="bg-card rounded-xl border border-slate-700/50">
        <button id="kline-toggle" class="w-full flex items-center justify-between p-5 text-left" type="button">
          <h2 class="text-lg font-semibold">K 線圖</h2>
          <span id="kline-toggle-icon" class="text-muted text-sm">▼ 收合</span>
        </button>
        <div id="kline-collapse" class="px-5 pb-5">
          <div class="flex items-center justify-end mb-3">
            <div id="kline-range-btns" class="flex gap-1">
              <button data-range="3M" class="range-btn">3M</button>
              <button data-range="6M" class="range-btn">6M</button>
              <button data-range="1Y" class="range-btn">1Y</button>
              <button data-range="3Y" class="range-btn">3Y</button>
              <button data-range="5Y" class="range-btn range-btn-active">5Y</button>
            </div>
          </div>
          <div id="kline-chart" class="w-full kline-chart-surface">
            <div class="section-loading h-full flex items-center justify-center">
              <div class="skeleton h-full w-full rounded-lg"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 1.8 (NEW): 策略買入分數（K 線後、估值前） -->
      <section id="section-strategy-scores" class="bg-card rounded-xl p-5 border border-slate-700/50">
        <h2 class="text-lg font-semibold mb-4">策略買入分數</h2>
        <div id="strategy-scores-container">
          <div class="section-loading"><div class="skeleton h-48 w-full rounded-lg"></div></div>
        </div>
      </section>

      <!-- Section 2: 估值趨勢表 | 股利發放歷史（兩欄並排） -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section id="section-valuation" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">估值趨勢（近 8 季）</h2>
          <div id="valuation-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>

        <section id="section-dividend" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">股利發放歷史（近 10 年）</h2>
          <div id="dividend-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>
      </div>

      <!-- Section 2.5 (NEW): 財務比率儀表板（6 張卡） -->
      <section id="section-ratios" class="bg-card rounded-xl p-5 border border-slate-700/50">
        <h2 class="text-lg font-semibold mb-4">財務比率儀表板</h2>
        <div id="ratios-dashboard-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
          <div class="section-loading"><div class="skeleton h-20 w-full rounded-lg"></div></div>
        </div>
      </section>

      <!-- Section 3: 月營收 | 季度損益 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section id="section-revenue" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">月營收（近 12 個月）</h2>
          <div id="revenue-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-40 w-full rounded-lg"></div></div>
          </div>
        </section>

        <section id="section-income" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">季度損益（近 8 季）</h2>
          <div id="income-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>
      </div>

      <!-- Section 3.5 (NEW): 現金流摘要 | 5Y 長期趨勢 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section id="section-cashflow" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">現金流摘要（近 8 季）</h2>
          <div id="cashflow-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>

        <section id="section-longterm" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">5 年長期趨勢</h2>
          <div id="longterm-trend-container">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>
      </div>

      <!-- Section 4: 法人買賣超 | 股權分散 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section id="section-institutional" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">三大法人買賣超（近 30 日）</h2>
          <div id="institutional-table-container" class="overflow-x-auto mb-4">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
          <div id="institutional-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="section-loading"><div class="skeleton h-24 w-full rounded-lg"></div></div>
            <div class="section-loading"><div class="skeleton h-24 w-full rounded-lg"></div></div>
            <div class="section-loading"><div class="skeleton h-24 w-full rounded-lg"></div></div>
          </div>
        </section>

        <section id="section-shareholders" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">股權分散表（近 12 週）</h2>
          <div id="shareholders-table-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
          </div>
        </section>
      </div>

      <!-- Section 4.5 (NEW): 公司治理（內部人持股 + 設質） -->
      <section id="section-governance" class="bg-card rounded-xl p-5 border border-slate-700/50">
        <h2 class="text-lg font-semibold mb-4">公司治理（近 12 月內部人持股與設質）</h2>
        <div id="governance-table-container" class="overflow-x-auto">
          <div class="section-loading"><div class="skeleton h-64 w-full rounded-lg"></div></div>
        </div>
      </section>

      <!-- Section 4.8 (NEW): 風險與技術面 -->
      <section id="section-risk-tech" class="bg-card rounded-xl p-5 border border-slate-700/50">
        <h2 class="text-lg font-semibold mb-4">風險與技術面</h2>
        <div id="risk-tech-container">
          <div class="section-loading"><div class="skeleton h-48 w-full rounded-lg"></div></div>
        </div>
      </section>

      <!-- Section 6: 策略績效（下半部不動） -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <section id="section-strategy-holding" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">策略持有績效（買入持有至今）</h2>
          <div id="strategy-holding-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-48 w-full rounded-lg"></div></div>
          </div>
        </section>

        <section id="section-strategy-trade" class="bg-card rounded-xl p-5 border border-slate-700/50">
          <h2 class="text-lg font-semibold mb-4">策略歷史交易績效</h2>
          <div id="strategy-trade-container" class="overflow-x-auto">
            <div class="section-loading"><div class="skeleton h-48 w-full rounded-lg"></div></div>
          </div>
        </section>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-slate-600 text-xs py-6 border-t border-slate-800">
    StockOnePage &mdash; 資料來源：CMWebAPI
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
